<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 科普海报提交系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: linear-gradient(to bottom right, #eafaff, #c7e0ff);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 720px;
            margin: 30px auto;
            background: white;
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 8px 25px rgba(0, 119, 181, 0.15);
            border: 4px solid #63b4ff;
        }
        .title {
            text-align: center;
            font-size: 32px;
            color: #ff5a40;
            margin-bottom: 28px;
            font-weight: bold;
        }
        .tab {
            display: flex;
            gap: 14px;
            margin-bottom: 30px;
        }
        .tab-btn {
            flex: 1;
            padding: 20px;
            font-size: 20px;
            border-radius: 16px;
            border: none;
            background: #f0f4f8;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn.active { background: #3a9dff; color: white; }
        .form-item { margin-bottom: 26px; }
        label {
            display: block;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        input, select {
            width: 100%;
            padding: 18px;
            font-size: 20px;
            border: 3px solid #dbe4ef;
            border-radius: 14px;
            outline: none;
        }
        input:focus, select:focus { border-color: #3a9dff; }
        .btn-group { display: flex; gap: 12px; margin-bottom: 12px; }
        .pick-btn {
            flex: 1;
            padding: 16px;
            font-size: 19px;
            border-radius: 12px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            display: block;
        }
        .album { background: #529cff; }
        .camera { background: #28c870; }
        .preview-box {
            margin-top: 12px;
            border: 2px dashed #99ccff;
            border-radius: 14px;
            padding: 10px;
            display: none;
        }
        .preview-box img { width: 100%; border-radius: 8px; }
        .submit-btn {
            width: 100%;
            padding: 26px;
            font-size: 26px;
            background: #28c870;
            color: white;
            border: none;
            border-radius: 18px;
            margin-top: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; }
        .tip {
            text-align: center;
            font-size: 18px;
            color: #666;
            margin-top: 16px;
        }
        .teacher-panel { display: none; }
        .teacher-btn {
            padding: 16px 28px;
            font-size: 20px;
            border-radius: 12px;
            border: none;
            margin-right: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .refresh { background: #3a9dff; }
        .clear { background: #ff5a40; }
        .card {
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 20px;
            background: #f9fdff;
            border: 2px solid #e6f0fa;
            position: relative;
        }
        .card img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 12px;
            margin: 12px 0;
        }
        .card p { font-size: 20px; line-height: 1.7; margin-bottom: 6px; }
        .delete-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 8px 16px;
            background: #ff5a40;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .empty-tip {
            text-align: center;
            font-size: 22px;
            color: #666;
            padding: 40px 0;
        }
        .real-file-input { position: absolute; left: -9999px; }
        
        /* 状态消息弹窗 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            z-index: 9999;
            animation: slideDown 0.3s ease;
            text-align: center;
            min-width: 300px;
        }
        .toast.success { background: #e8f5e9; color: #2e7d32; border: 2px solid #4caf50; }
        .toast.error { background: #ffebee; color: #c62828; border: 2px solid #f44336; }
        .toast.info { background: #e3f2fd; color: #1565c0; border: 2px solid #2196f3; }
        @keyframes slideDown {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* ====== 图片放大灯箱 ====== */
        .card img {
            cursor: zoom-in;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card img:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.88);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.25s ease;
        }
        .lightbox.show {
            display: flex;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .lightbox-inner {
            position: relative;
            max-width: 96vw;
            max-height: 96vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }
        .lightbox-img {
            max-width: 92vw;
            max-height: 82vh;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
            object-fit: contain;
            animation: zoomIn 0.25s ease;
        }
        @keyframes zoomIn {
            from { transform: scale(0.85); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .lightbox-caption {
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            background: rgba(255,255,255,0.12);
            padding: 10px 24px;
            border-radius: 30px;
        }
        .lightbox-close {
            position: fixed;
            top: 20px;
            right: 24px;
            background: rgba(255,255,255,0.18);
            color: white;
            border: none;
            border-radius: 50%;
            width: 52px;
            height: 52px;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .lightbox-close:hover {
            background: rgba(255,255,255,0.32);
        }
        /* 左右切换按钮 */
        .lightbox-prev,
        .lightbox-next {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.18);
            color: white;
            border: none;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .lightbox-prev { left: 16px; }
        .lightbox-next { right: 16px; }
        .lightbox-prev:hover,
        .lightbox-next:hover {
            background: rgba(255,255,255,0.32);
        }
        .lightbox-counter {
            color: rgba(255,255,255,0.7);
            font-size: 16px;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Toast 弹窗 -->
    <div id="toast" class="toast" style="display:none;"></div>

    <!-- 图片放大灯箱 -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
        <div class="lightbox-inner" onclick="event.stopPropagation()">
            <img id="lightboxImg" class="lightbox-img" src="" alt="放大图">
            <div id="lightboxCaption" class="lightbox-caption"></div>
            <div id="lightboxCounter" class="lightbox-counter"></div>
        </div>
        <button class="lightbox-close" onclick="closeLightbox()" title="关闭">✕</button>
        <button class="lightbox-prev" onclick="switchImage(-1)" title="上一张">&#8249;</button>
        <button class="lightbox-next" onclick="switchImage(1)" title="下一张">&#8250;</button>
    </div>

    <div class="container">
        <div class="title">🌍 我的科普海报提交啦！</div>
        <div class="tab">
            <button class="tab-btn active" id="studentBtn">我是科普宣传员</button>
            <button class="tab-btn" id="teacherBtn">我是老师</button>
        </div>

        <div id="studentPanel">
            <!-- 1. 你的小组 -->
            <div class="form-item">
                <label>1. 你的小组</label>
                <select id="group">
                    <option value="">请选择小组</option>
                    <option>第一组</option><option>第二组</option><option>第三组</option>
                    <option>第四组</option><option>第五组</option><option>第六组</option>
                    <option>第七组</option><option>第八组</option><option>第九组</option>
                    <option>第十组</option><option>第十一组</option>
                </select>
            </div>

            <!-- 2. 科普主题（改为下拉选择） -->
            <div class="form-item">
                <label>2. 科普主题</label>
                <select id="topic">
                    <option value="">请选择科普主题</option>
                    <option>地球与太阳系</option>
                    <option>地球的水资源</option>
                    <option>地球上的动物</option>
                    <option>保护地球家园</option>
                </select>
            </div>

            <!-- 3. 上传海报照片 -->
            <div class="form-item">
                <label>3. 上传海报照片</label>
                <div class="btn-group">
                    <label for="albumInput" class="pick-btn album">📁 从相册选取</label>
                    <label for="cameraInput" class="pick-btn camera">📷 立即拍照</label>
                </div>
                <input type="file" id="albumInput" accept="image/*" class="real-file-input">
                <input type="file" id="cameraInput" accept="image/*" capture="environment" class="real-file-input">
                <div class="preview-box" id="previewBox">
                    <img id="previewImg">
                </div>
            </div>

            <button type="button" class="submit-btn" id="submitBtn">✅ 我要提交！</button>
            <p class="tip">提交成功就可以啦，不要重复点哦~</p>
        </div>

        <div id="teacherPanel" class="teacher-panel">
            <button type="button" class="teacher-btn refresh" id="refreshBtn">🔄 刷新查看全部</button>
            <button type="button" class="teacher-btn clear" id="clearBtn">🗑️ 清空全部数据</button>
            <div id="list">
                <p class="empty-tip">点击"刷新查看全部"加载提交记录</p>
            </div>
        </div>
    </div>

    <script>
        // ====== Toast 弹窗 ======
        function showToast(message, type) {
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + (type || 'info');
            toast.style.display = 'block';
            clearTimeout(toast._timer);
            toast._timer = setTimeout(function() {
                toast.style.display = 'none';
            }, 4000);
        }

        // ====== 初始化 Supabase ======
        var SUPABASE_URL = "https://xdvesanawldqoszlziwj.supabase.co";
        var SUPABASE_KEY = "sb_publishable_FAcKfbsGcu2XFp1hvjfzRA_Urzq0l9p";
        var sb = null;
        var sub = null;
        var selectedFile = null;

        function initSupabase() {
            try {
                if (typeof supabase === 'undefined') {
                    showToast('Supabase SDK 未加载，请检查网络连接', 'error');
                    return false;
                }
                sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                console.log('Supabase 初始化成功');
                return true;
            } catch (e) {
                console.error('Supabase 初始化失败:', e);
                showToast('系统初始化失败: ' + e.message, 'error');
                return false;
            }
        }

        // 获取 supabase 实例（带检查）
        function getSB() {
            if (!sb) {
                if (!initSupabase()) return null;
            }
            return sb;
        }

        // ====== 文件选择 ======
        document.getElementById('albumInput').onchange = handleFile;
        document.getElementById('cameraInput').onchange = handleFile;

        function handleFile() {
            var file = this.files[0];
            if (!file) return;

            if (file.size > 7 * 1024 * 1024) {
                showToast('图片太大，不能超过7MB', 'error');
                this.value = '';
                return;
            }

            if (!file.type.match(/^image\//)) {
                showToast('请选择图片文件', 'error');
                this.value = '';
                return;
            }

            selectedFile = file;
            console.log('已选择文件:', file.name, '(' + (file.size / 1024).toFixed(1) + ' KB)');

            var reader = new FileReader();
            reader.onload = function() {
                document.getElementById('previewImg').src = reader.result;
                document.getElementById('previewBox').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        // ====== 切换面板 ======
        document.getElementById('studentBtn').onclick = function() {
            document.getElementById('studentPanel').style.display = 'block';
            document.getElementById('teacherPanel').style.display = 'none';
            if (sub) { sub.unsubscribe(); sub = null; }
        };

        document.getElementById('teacherBtn').onclick = function() {
            document.getElementById('studentPanel').style.display = 'none';
            document.getElementById('teacherPanel').style.display = 'block';
            loadAll();
            setupReal();
        };

        // ====== 实时订阅 ======
        function setupReal() {
            var s = getSB();
            if (!s) return;
            if (sub) sub.unsubscribe();

            sub = s.channel('posts-ch')
                .on('postgres_changes', 
                    { event: '*', schema: 'public', table: 'posts' },
                    function() { loadAll(); }
                )
                .subscribe();
        }

        // ====== 提交 ======
        function submitPost() {
            var s = getSB();
            if (!s) {
                showToast('系统未就绪，请刷新页面重试', 'error');
                return;
            }

            var group = document.getElementById('group').value;
            var topic = document.getElementById('topic').value;

            if (!group || !topic || !selectedFile) {
                showToast('请填写完整并选择图片', 'error');
                return;
            }

            var btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '📤 上传中...';

            (async function() {
                try {
                    console.log('=== 开始提交 ===');
                    console.log('小组:', group, '主题:', topic);
                    console.log('文件:', selectedFile.name, selectedFile.type, selectedFile.size);

                    // 步骤1: 检查重复
                    btn.textContent = '🔍 检查中...';
                    var r1 = await s.from('posts').select('id').eq('group_name', group).single();
                    console.log('重复检查结果:', r1);
                    if (r1.data) {
                        showToast('该小组已经提交过了！', 'error');
                        btn.disabled = false;
                        btn.textContent = '✅ 我要提交！';
                        return;
                    }
                    if (r1.error && r1.error.code !== 'PGRST116') {
                        console.error('检查重复失败:', r1.error);
                    }

                    // 步骤2: 上传图片
                    btn.textContent = '📤 上传图片...';
                    var fileName = 'poster_' + Date.now() + '_' + selectedFile.name.replace(/[^a-zA-Z0-9.]/g, '_');
                    console.log('上传文件名:', fileName);

                    var r2 = await s.storage.from('posters').upload(fileName, selectedFile, {
                        cacheControl: '3600',
                        upsert: false
                    });
                    console.log('上传结果:', r2);
                    if (r2.error) {
                        console.error('上传错误详情:', JSON.stringify(r2.error));
                        throw new Error('图片上传失败: ' + r2.error.message);
                    }
                    console.log('图片上传成功 ✅');

                    // 步骤3: 获取公开URL
                    var r3 = s.storage.from('posters').getPublicUrl(fileName);
                    var publicUrl = r3.data.publicUrl;
                    console.log('公开URL:', publicUrl);

                    // 步骤4: 保存到数据库（不再保存 create_type）
                    btn.textContent = '💾 保存中...';
                    var r4 = await s.from('posts').insert([{
                        group_name: group,
                        topic: topic,
                        image_url: publicUrl,
                        created_at: new Date().toISOString()
                    }]);
                    console.log('数据库保存结果:', r4);
                    if (r4.error) {
                        console.error('数据库保存错误详情:', JSON.stringify(r4.error));
                        throw new Error('保存记录失败: ' + r4.error.message);
                    }

                    console.log('=== 提交成功 🎉 ===');
                    showToast('🎉 提交成功！', 'success');

                    // 清空表单
                    document.getElementById('group').value = '';
                    document.getElementById('topic').value = '';
                    selectedFile = null;
                    document.getElementById('previewBox').style.display = 'none';
                    document.getElementById('albumInput').value = '';
                    document.getElementById('cameraInput').value = '';

                } catch (e) {
                    console.error('提交失败:', e);
                    showToast('提交失败: ' + e.message, 'error');
                } finally {
                    btn.disabled = false;
                    btn.textContent = '✅ 我要提交！';
                }
            })();
        }

        document.getElementById('submitBtn').onclick = submitPost;

        // ====== 加载全部 ======
        function loadAll() {
            var s = getSB();
            if (!s) return;
            var box = document.getElementById('list');
            box.innerHTML = '<p class="empty-tip">⏳ 加载中...</p>';

            (async function() {
                try {
                    var r = await s.from('posts').select('*').order('created_at', { ascending: false });
                    console.log('加载结果:', r);
                    if (r.error) throw r.error;

                    if (r.data.length === 0) {
                        box.innerHTML = '<p class="empty-tip">暂无提交记录</p>';
                        return;
                    }

                    var html = '<p style="text-align:center;font-size:18px;color:#3a9dff;margin-bottom:15px;">共有 ' + r.data.length + ' 份提交</p>';
                    // 保存图片列表，用于灯箱切换
                    lightboxImages = [];
                    r.data.forEach(function(item, idx) {
                        var t = new Date(item.created_at).toLocaleString('zh-CN');
                        lightboxImages.push({ url: item.image_url, caption: '🧑 ' + item.group_name + '　📖 ' + item.topic });
                        html += '<div class="card">' +
                            '<button class="delete-btn" onclick="delOne(\'' + item.id + '\')">删除</button>' +
                            '<p>🧑 小组：' + item.group_name + '</p>' +
                            '<p>📖 主题：' + item.topic + '</p>' +
                            '<p>⏰ 提交时间：' + t + '</p>' +
                            '<p>🖼️ 作品：<span style="font-size:14px;color:#999;">（点击图片可放大）</span></p>' +
                            '<img src="' + item.image_url + '" alt="作品" onclick="openLightbox(' + idx + ')">' +
                            '</div>';
                    });
                    box.innerHTML = html;
                } catch (e) {
                    console.error('加载失败:', e);
                    box.innerHTML = '<p class="empty-tip">加载失败: ' + e.message + '</p>';
                }
            })();
        }

        document.getElementById('refreshBtn').onclick = loadAll;

        // ====== 删除单条 ======
        function delOne(id) {
            if (!confirm('确定删除这条记录？')) return;
            var s = getSB();
            if (!s) return;
            (async function() {
                try {
                    var r = await s.from('posts').delete().eq('id', id);
                    if (r.error) throw r.error;
                    showToast('已删除', 'success');
                    loadAll();
                } catch (e) {
                    showToast('删除失败: ' + e.message, 'error');
                }
            })();
        }

        // ====== 清空全部 ======
        function clearAll() {
            if (!confirm('确定清空所有提交？此操作不可恢复！')) return;
            if (!confirm('再次确认：真的要删除所有数据吗？')) return;
            var s = getSB();
            if (!s) return;
            (async function() {
                try {
                    var r = await s.from('posts').delete({ count: 'exact' }).not('id', 'is', null);
                    if (r.error) throw r.error;
                    showToast('已清空 ' + r.count + ' 条记录', 'success');
                    loadAll();
                } catch (e) {
                    showToast('清空失败: ' + e.message, 'error');
                }
            })();
        }

        document.getElementById('clearBtn').onclick = clearAll;

        // ====== 灯箱功能 ======
        var lightboxImages = [];
        var lightboxIndex = 0;

        function openLightbox(idx) {
            lightboxIndex = idx;
            showLightboxImage();
            document.getElementById('lightbox').classList.add('show');
            document.addEventListener('keydown', lightboxKeyHandler);
        }

        function showLightboxImage() {
            var item = lightboxImages[lightboxIndex];
            document.getElementById('lightboxImg').src = item.url;
            document.getElementById('lightboxCaption').textContent = item.caption;
            document.getElementById('lightboxCounter').textContent =
                (lightboxIndex + 1) + ' / ' + lightboxImages.length;
            // 切换时重播动画
            var img = document.getElementById('lightboxImg');
            img.style.animation = 'none';
            img.offsetHeight; // reflow
            img.style.animation = 'zoomIn 0.2s ease';
        }

        function closeLightbox(e) {
            if (e && e.target !== document.getElementById('lightbox') && e.target.tagName !== 'BUTTON') return;
            document.getElementById('lightbox').classList.remove('show');
            document.removeEventListener('keydown', lightboxKeyHandler);
        }

        function switchImage(dir) {
            lightboxIndex = (lightboxIndex + dir + lightboxImages.length) % lightboxImages.length;
            showLightboxImage();
        }

        function lightboxKeyHandler(e) {
            if (e.key === 'Escape') {
                document.getElementById('lightbox').classList.remove('show');
                document.removeEventListener('keydown', lightboxKeyHandler);
            } else if (e.key === 'ArrowRight') {
                switchImage(1);
            } else if (e.key === 'ArrowLeft') {
                switchImage(-1);
            }
        }

        // ====== 页面初始化 ======
        console.log('=== 科普海报提交系统启动 ===');
        if (initSupabase()) {
            console.log('系统就绪，可以提交');
        } else {
            console.error('初始化失败');
        }
    </script>
</body>
</html>
