<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 科普海报提交系统 - 云端版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: linear-gradient(to bottom right, #eafaff, #c7e9ff);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 720px;
            margin: 30px auto;
            background: white;
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 8px 25px rgba(0, 119, 181, 0.15);
            border: 4px solid #63b4ff;
        }
        .title {
            text-align: center;
            font-size: 32px;
            color: #ff5c40;
            margin-bottom: 28px;
            font-weight: bold;
        }
        .tab {
            display: flex;
            gap: 14px;
            margin-bottom: 30px;
        }
        .tab-btn {
            flex: 1;
            padding: 20px;
            font-size: 20px;
            border-radius: 16px;
            border: none;
            background: #f0f4f8;
            font-weight: bold;
            cursor: pointer;
        }
        .tab-btn.active {
            background: #3a9dff;
            color: white;
        }
        .form-item {
            margin-bottom: 26px;
        }
        label {
            display: block;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        input, select {
            width: 100%;
            padding: 18px;
            font-size: 20px;
            border: 3px solid #dbe4ef;
            border-radius: 14px;
            outline: none;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        .pick-btn {
            flex: 1;
            padding: 16px;
            font-size: 19px;
            border-radius: 12px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .album { background: #529cff; }
        .camera { background: #28c870; }
        .preview-box {
            margin-top: 12px;
            border: 2px dashed #99ccff;
            border-radius: 14px;
            padding: 10px;
            display: none;
        }
        .preview-box img {
            width: 100%;
            border-radius: 8px;
        }
        .submit-btn {
            width: 100%;
            padding: 26px;
            font-size: 26px;
            background: #28c870;
            color: white;
            border: none;
            border-radius: 18px;
            margin-top: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        .tip {
            text-align: center;
            font-size: 18px;
            color: #666;
            margin-top: 16px;
        }
        .teacher-panel {
            display: none;
        }
        .teacher-btn {
            padding: 16px 28px;
            font-size: 20px;
            border-radius: 12px;
            border: none;
            margin-right: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .refresh { background: #3a9dff; }
        .clear { background: #ff5c40; }
        .card {
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 20px;
            background: #f9fdff;
            border: 2px solid #e6f0fa;
        }
        .card img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 12px;
            margin: 12px 0;
        }
        .card p {
            font-size: 20px;
            line-height: 1.7;
        }
        .empty-tip {
            text-align: center;
            font-size: 22px;
            color: #666;
            padding: 40px 0;
        }
        .hide-input {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">🌍 我的科普海报提交啦！</div>
        <div class="tab">
            <button class="tab-btn active" id="studentBtn">我是科普宣传员</button>
            <button class="tab-btn" id="teacherBtn">我是老师</button>
        </div>

        <div id="studentPanel">
            <div class="form-item">
                <label>1. 你的小组</label>
                <select id="group">
                    <option value="">请选择小组</option>
                    <option>第一组</option>
                    <option>第二组</option>
                    <option>第三组</option>
                    <option>第四组</option>
                    <option>第五组</option>
                    <option>第六组</option>
                    <option>第七组</option>
                    <option>第八组</option>
                </select>
            </div>
            <div class="form-item">
                <label>2. 创作方式</label>
                <select id="createType">
                    <option value="">请选择创作方式</option>
                    <option>手绘创作</option>
                    <option>AI创作</option>
                    <option>手绘+AI辅助创作</option>
                </select>
            </div>
            <div class="form-item">
                <label>3. 科普主题</label>
                <input type="text" id="topic" placeholder="例如：太空、动物、天气、植物">
            </div>
            <div class="form-item">
                <label>4. 上传海报照片</label>
                <div class="btn-group">
                    <button class="pick-btn album" onclick="choosePhoto()">📁 从相册选取</button>
                    <button class="pick-btn camera" onclick="takePhoto()">📷 立即拍照</button>
                </div>
                <input class="hide-input" id="fileInput" type="file" accept="image/*">
                <input class="hide-input" id="cameraInput" type="file" accept="image/*" capture="environment">
                <div class="preview-box" id="preview">
                    <img id="previewImg">
                </div>
            </div>
            <button class="submit-btn" onclick="submitPost()">✅ 我要提交！</button>
            <p class="tip">提交成功就可以啦，不要重复点哦~</p>
        </div>

        <div id="teacherPanel" class="teacher-panel">
            <button class="teacher-btn refresh" onclick="loadAll()">🔄 刷新查看全部</button>
            <button class="teacher-btn clear" onclick="clearAll()">🗑️ 清空全部数据</button>
            <div id="list"></div>
        </div>
    </div>

    <script>
        // ====================== 填入你的 Supabase 信息 ======================
        const supabaseUrl = "https://xdvesanawldqoszlziwj.supabase.co";
        const supabaseKey = "sb_publishable_FAcKfbsGcu2XFp1hvjfzRA_Urzq0l9p";
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let selectedFile = null;

        function choosePhoto() {
            document.getElementById("fileInput").click();
        }
        function takePhoto() {
            document.getElementById("cameraInput").click();
        }

        document.getElementById("fileInput").onchange = showPreview;
        document.getElementById("cameraInput").onchange = showPreview;

        function showPreview(e) {
            const file = e.target.files[0];
            if (!file) return;
            selectedFile = file;
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function () {
                document.getElementById("previewImg").src = this.result;
                document.getElementById("preview").style.display = "block";
            };
        }

        document.getElementById("studentBtn").onclick = () => {
            document.getElementById("studentPanel").style.display = "block";
            document.getElementById("teacherPanel").style.display = "none";
        };
        document.getElementById("teacherBtn").onclick = () => {
            document.getElementById("studentPanel").style.display = "none";
            document.getElementById("teacherPanel").style.display = "block";
            loadAll();
        };

        async function submitPost() {
            const group = document.getElementById("group").value;
            const createType = document.getElementById("createType").value;
            const topic = document.getElementById("topic").value.trim();

            if (!group || !createType || !topic || !selectedFile) {
                alert("请填写完整并上传图片！");
                return;
            }

            try {
                const fileName = `${Date.now()}_${selectedFile.name}`;
                const { data: imgData, error: imgError } = await supabase.storage
                    .from('posters')
                    .upload(fileName, selectedFile);

                if (imgError) throw imgError;

                const { data: { publicUrl } } = supabase.storage
                    .from('posters')
                    .getPublicUrl(fileName);

                const { error } = await supabase.from('posts').insert([{
                    group_name: group,
                    create_type: createType,
                    topic: topic,
                    image_url: publicUrl
                }]);

                if (error) throw error;

                alert("提交成功！🎉");
                document.getElementById("group").value = "";
                document.getElementById("createType").value = "";
                document.getElementById("topic").value = "";
                selectedFile = null;
                document.getElementById("preview").style.display = "none";
            } catch (err) {
                alert("提交失败：" + err.message);
            }
        }

        async function loadAll() {
            const { data, error } = await supabase.from('posts').select('*').order('created_at', { ascending: false });
            const box = document.getElementById("list");

            if (error) {
                box.innerHTML = "<p>加载失败：" + error.message + "</p>";
                return;
            }
            if (data.length === 0) {
                box.innerHTML = "<p class='empty-tip'>暂无提交</p>";
                return;
            }

            let html = "";
            data.forEach((item, i) => {
                html += `
                <div class="card">
                    <p>🧑 小组：${item.group_name}</p>
                    <p>🎨 创作方式：${item.create_type}</p>
                    <p>📖 主题：${item.topic}</p>
                    <p>🖼️ 作品：</p>
                    <img src="${item.image_url}">
                </div>`;
            });
            box.innerHTML = html;
        }

        async function clearAll() {
            if (!confirm("确定清空所有提交？")) return;
            await supabase.from('posts').delete().neq('id', 0);
            loadAll();
            alert("已清空！");
        }
    </script>
</body>
</html>
