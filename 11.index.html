<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科普海报小助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
        }

        body {
            background: #f0f8ff;
            padding: 15px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            border: 4px solid #87CEEB;
        }

        .title {
            text-align: center;
            font-size: 28px;
            color: #FF6347;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .tab {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            padding: 18px;
            font-size: 20px;
            border-radius: 15px;
            border: none;
            background: #e0e0e0;
            font-weight: bold;
        }

        .tab-btn.active {
            background: #1E90FF;
            color: white;
        }

        /* 学生端样式 - 超大简化 */
        .form-item {
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 18px;
            font-size: 20px;
            border: 3px solid #ccc;
            border-radius: 12px;
        }

        textarea {
            min-height: 150px;
        }

        /* 超大提交按钮 */
        .submit-btn {
            width: 100%;
            padding: 25px;
            font-size: 26px;
            font-weight: bold;
            background: #32CD32;
            color: white;
            border: none;
            border-radius: 15px;
            margin-top: 10px;
        }

        .submit-btn:active {
            background: #228B22;
        }

        /* 提示语 */
        .tip {
            text-align: center;
            font-size: 18px;
            color: #666;
            margin-top: 15px;
        }

        /* 教师端 */
        .teacher-panel {
            display: none;
        }

        .teacher-btn {
            padding: 15px 25px;
            font-size: 20px;
            border-radius: 10px;
            border: none;
            margin-right: 10px;
            margin-bottom: 15px;
            color: white;
        }

        .refresh {
            background: #1E90FF;
        }

        .clear {
            background: #FF4500;
        }

        .card {
            border: 2px solid #eee;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            background: #fafafa;
        }

        .card img {
            max-width: 100%;
            max-height: 350px;
            border-radius: 10px;
            margin: 10px 0;
        }

        .card p {
            font-size: 20px;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="title">🎨 我的科普海报提交啦！</div>

        <!-- 切换按钮 -->
        <div class="tab">
            <button class="tab-btn active" id="studentBtn">我是小朋友</button>
            <button class="tab-btn" id="teacherBtn">我是老师</button>
        </div>

        <!-- ==================== 学生端 ==================== -->
        <div id="studentPanel">
            <div class="form-item">
                <label>1. 你的小组</label>
                <input type="text" id="name" placeholder="例如：第一组">
            </div>

            <div class="form-item">
                <label>2. 你的班级</label>
                <input type="text" id="className" placeholder="例如：三年级1班">
            </div>

            <div class="form-item">
                <label>3. 科普主题</label>
                <input type="text" id="topic" placeholder="例如：太空、动物、天气、植物">
            </div>

            <div class="form-item">
                <label>4. 科普小知识</label>
                <textarea id="content" placeholder="写下你知道的科普知识~"></textarea>
            </div>

            <div class="form-item">
                <label>5. 上传海报照片</label>
                <input type="file" id="imageUpload" accept="image/*" style="font-size:18px;">
            </div>

            <button class="submit-btn" onclick="submit()">✅ 我要提交！</button>
            <p class="tip">提交成功就可以啦，不要重复点哦~</p>
        </div>

        <!-- ==================== 教师端 ==================== -->
        <div id="teacherPanel" class="teacher-panel">
            <button class="teacher-btn refresh" onclick="loadData()">🔄 刷新查看</button>
            <button class="teacher-btn clear" onclick="clearData()">🗑️ 清空全部</button>
            <div id="dataList" style="margin-top:20px;"></div>
        </div>
    </div>

    <script>
        // 切换面板
        const studentBtn = document.getElementById('studentBtn');
        const teacherBtn = document.getElementById('teacherBtn');
        const studentPanel = document.getElementById('studentPanel');
        const teacherPanel = document.getElementById('teacherPanel');

        studentBtn.onclick = function() {
            studentPanel.style.display = 'block';
            teacherPanel.style.display = 'none';
            studentBtn.classList.add('active');
            teacherBtn.classList.remove('active');
        }

        teacherBtn.onclick = function() {
            studentPanel.style.display = 'none';
            teacherPanel.style.display = 'block';
            teacherBtn.classList.add('active');
            studentBtn.classList.remove('active');
            loadData();
        }

        // 提交（小学生版，简单提示）
        function submit() {
            const name = document.getElementById('name').value.trim();
            const className = document.getElementById('className').value.trim();
            const topic = document.getElementById('topic').value.trim();
            const content = document.getElementById('content').value.trim();
            const file = document.getElementById('imageUpload').files[0];

            if (!name || !className || !topic || !content || !file) {
                alert('小朋友，要把每一项都填完哦！');
                return;
            }

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function() {
                const data = {
                    name, className, topic, content,
                    img: this.result,
                    time: new Date().toLocaleString()
                };

                let list = JSON.parse(localStorage.getItem('poster') || '[]');
                list.push(data);
                localStorage.setItem('poster', JSON.stringify(list));

                alert('提交成功啦！你真棒！🎉');
                
                // 清空表单
                document.getElementById('name').value = '';
                document.getElementById('className').value = '';
                document.getElementById('topic').value = '';
                document.getElementById('content').value = '';
                document.getElementById('imageUpload').value = '';
            }
        }

        // 老师加载数据
        function loadData() {
            const list = JSON.parse(localStorage.getItem('poster') || '[]');
            const box = document.getElementById('dataList');

            if (list.length === 0) {
                box.innerHTML = '<p style="font-size:22px;">还没有小朋友提交哦~</p>';
                return;
            }

            let html = '';
            list.forEach((item, i) => {
                html += `
                <div class="card">
                    <p style="font-weight:bold;">第 ${i+1} 个作品 | ${item.time}</p>
                    <p>🧑 小朋友：${item.name}</p>
                    <p>🏫 班级：${item.className}</p>
                    <p>📖 主题：${item.topic}</p>
                    <p>✍️ 知识：${item.content}</p>
                    <p>🖼️ 海报：</p>
                    <img src="${item.img}">
                </div>`;
            });

            box.innerHTML = html;
        }

        // 清空数据
        function clearData() {
            if (confirm('确定要清空所有作品吗？')) {
                localStorage.removeItem('poster');
                loadData();
            }
        }
    </script>
</body>
</html>
